<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gemma-4 Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="chatbox-wrapper">
        <div id="chatbox"></div>
        <div id="cancelOverlay" class="cancel-overlay" style="display: none;">
            <button id="cancelBtn" class="cancel-btn" onclick="cancelRequest()">요청취소 ✖</button>
        </div>
    </div>
    <div id="imagePreviewContainer" class="image-preview-container">
        <img id="imagePreview" src="">
        <button class="remove-image" onclick="clearImage()">×</button>
    </div>
    <div class="input-area">
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="previewImage(this)">
        <div class="extra-controls">
            <label class="reasoning-toggle" title="Toggle Reasoning (Thinking)">
                <input type="checkbox" id="enableReasoning">
                🤔
            </label>
            <button class="upload-btn" onclick="document.getElementById('imageInput').click()" title="이미지 첨부">🖼️
            </button>
        </div>
        <div class="textarea-wrapper">
            <textarea id="userInput" placeholder="메시지를 입력하세요...&#10;(Shift+Enter로 줄바꿈)" rows="1"></textarea>
            <button class="send-btn" onclick="send()" title="전송">⏎</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
